<p>Redirigiendo de vuelta a la app local…</p>
<script>
  // Relay estático: TikTok solo permite redirect_uri bajo un dominio HTTPS verificado
  // (physiquelogic.co), pero el intercambio de token con el Client Secret ocurre en el
  // servidor local de desarrollo. Esta página reenvía code/state tal cual al servidor local
  // sin tocarlos ni almacenarlos.
  location.replace('http://localhost:3010/callback' + location.search);
</script>
